version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: afrione-postgres
    environment:
      POSTGRES_DB: afrione_dev
      POSTGRES_USER: afrione
      POSTGRES_PASSWORD: afrionepassword
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afrione -d afrione_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afrione-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: afrione-api
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: afrione_dev
      DB_USER: afrione
      DB_PASSWORD: afrionepassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: apps/api/package.json

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: afrione-web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file:
      - apps/web/.env.local
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: rebuild
          path: apps/web/package.json

volumes:
  postgres_data:
  redis_data:
